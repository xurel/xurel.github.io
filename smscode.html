<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XUREl - Shopee Panel</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --brd: #30363d; --text: #c9d1d9; --org: #ee4d2d; --grn: #3fb950; --blu: #58a6ff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 400px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--brd); }
        .bal-val { color: var(--grn); font-weight: bold; font-family: monospace; font-size: 18px; }
        .price-list { border: 1px solid var(--brd); border-radius: 10px; overflow: hidden; background: var(--card); margin-bottom: 20px; }
        .price-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--brd); cursor: pointer; transition: 0.2s; }
        .price-item:hover { background: #21262d; border-left: 4px solid var(--org); }
        .price-item:last-child { border-bottom: none; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--brd); border-radius: 8px; overflow: hidden; margin-top: 15px; border: 1px solid var(--brd); }
        .btn { background: var(--card); border: none; padding: 12px; color: #8b949e; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn:not(:disabled):hover { background: #21262d; color: #fff; }
        .section-title { font-size: 12px; color: #8b949e; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3 style="margin:0; color:var(--org); font-size: 18px;">› XUREl Shopee</h3>
        <div style="text-align:right;">
            <div style="font-size:10px; color:#8b949e; font-weight: bold; letter-spacing: 1px;">SALDO (IDR)</div>
            <div id="balDisplay" class="bal-val">Loading...</div>
        </div>
    </div>

    <div id="activeOrdersContainer"></div>

    <div class="section-title">PESAN NOMOR BARU</div>
    <div class="price-list" id="priceContainer">
        <div style="padding:40px; text-align:center; color:#8b949e; font-size: 14px;">Memuat Stok Shopee...</div>
    </div>
</div>

<script>
    const WORKER = "https://smscode.aam-zip.workers.dev";
    let poller;

    async function init() {
        updateBalance();
        loadPrices();
        pollActiveOrders();
        // Polling setiap 5 detik untuk cek OTP & Pesanan
        poller = setInterval(pollActiveOrders, 5000);
    }

    async function updateBalance() {
        try {
            const bRes = await fetch(`${WORKER}/get-balance`);
            const bJson = await bRes.json();
            if(bJson.success) {
                document.getElementById('balDisplay').innerText = `Rp ${bJson.data.balance.toLocaleString('id-ID')}`;
            }
        } catch(e) {}
    }

    async function loadPrices() {
        try {
            const pRes = await fetch(`${WORKER}/get-prices`);
            const pJson = await pRes.json();
            const container = document.getElementById('priceContainer');
            
            if (pJson.success && pJson.data.length > 0) {
                container.innerHTML = pJson.data.map(i => `
                    <div class="price-item" onclick="buy(${i.id}, ${i.price})">
                        <div>
                            <div style="font-weight: bold; font-size: 14px; margin-bottom: 4px;">${i.name || 'Shopee ID'}</div>
                            <div style="color: var(--grn); font-weight: bold; font-family: monospace;">Rp ${i.price.toLocaleString('id-ID')}</div>
                        </div>
                        <div style="text-align: right;">
                            <span style="background: var(--brd); padding: 4px 8px; border-radius: 4px; font-size: 11px; color: #8b949e;">${i.available} stok</span>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<div style="padding:40px; text-align:center; color:#8b949e;">Stok Shopee sedang kosong.</div>`;
            }
        } catch (e) {
            document.getElementById('priceContainer').innerHTML = `<div style="padding:40px; text-align:center; color:#f85149;">Gagal memuat harga.</div>`;
        }
    }

    async function buy(pid, price) {
        if(!confirm(`Beli nomor ini seharga Rp ${price.toLocaleString('id-ID')}?`)) return;
        
        try {
            const res = await fetch(`${WORKER}/create-order`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ product_id: pid })
            });
            const json = await res.json();
            
            if(json.success) {
                updateBalance();
                pollActiveOrders(); // Langsung munculkan pesanan di atas
            } else { 
                alert("Gagal Memesan: " + (json.error?.message || "Saldo tidak cukup atau stok habis")); 
                loadPrices();
            }
        } catch (e) {
            alert("Terjadi kesalahan jaringan.");
        }
    }

    async function pollActiveOrders() {
        try {
            const res = await fetch(`${WORKER}/get-active`);
            const json = await res.json();
            
            if(json.success) {
                renderActiveOrders(json.data);
            }
        } catch(e) {} 
    }

    function renderActiveOrders(orders) {
        const container = document.getElementById('activeOrdersContainer');
        
        if (!orders || orders.length === 0) {
            container.innerHTML = '';
            return;
        }

        container.innerHTML = orders.map(o => {
            // FIX UNDEFINED: Mencari 'phone', 'phone_number', atau 'number'
            const phone = o.phone || o.phone_number || o.number || 'Memuat...';
            const otp = o.otp_code || 'Menunggu...';
            const otpColor = o.otp_code ? 'var(--grn)' : 'var(--org)';
            const btnState = o.otp_code ? '' : 'disabled';
            
            return `
            <div style="background:var(--card); border:1px solid var(--brd); border-radius:12px; padding:20px; margin-bottom:20px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom: 1px dashed var(--brd); padding-bottom: 10px;">
                    <span style="color:var(--blu); font-weight:bold; font-family: monospace;">#${o.id}</span>
                    <span style="color:var(--org); font-family:monospace; font-size:12px;">Aktif</span>
                </div>
                
                <div style="font-size:11px; color:#8b949e; margin-bottom: 4px;">NOMOR TELEPON:</div>
                <div style="font-size:22px; font-weight:bold; color:var(--text); margin-bottom:20px; font-family: monospace; letter-spacing: 1px;">${phone}</div>
                
                <div style="font-size:11px; color:#8b949e; margin-bottom: 4px;">KODE OTP:</div>
                <div style="font-size:28px; font-weight:bold; color:${otpColor}; font-family: monospace;">${otp}</div>
                
                <div class="btn-grid">
                    <button class="btn" onclick="sendAction('finish', ${o.id})" ${btnState} style="${o.otp_code ? 'color:var(--grn)' : ''}">✓ Selesai</button>
                    <button class="btn" onclick="sendAction('cancel', ${o.id})">✕ Batal</button>
                </div>
            </div>
            `;
        }).join('');
    }

    async function sendAction(act, id) {
        if(act === 'cancel' && !confirm("Yakin ingin membatalkan pesanan ini?")) return;
        
        try {
            const res = await fetch(`${WORKER}/order-action`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: id, action: act })
            });
            const json = await res.json();
            
            if(json.success) {
                updateBalance();
                pollActiveOrders();
            } else {
                alert("Gagal: " + (json.error?.message || "Belum bisa membatalkan pesanan (Tunggu 2 menit dari awal pesan)"));
            }
        } catch (e) { 
            alert("Error jaringan saat mengirim aksi."); 
        }
    }

    init();
</script>
</body>
</html>
