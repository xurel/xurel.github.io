<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XUREl - smscode Dashboard</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --brd: #30363d; --gray: #8b949e; --org: #ee4d2d; --blue: #58a6ff; --grn: #3fb950; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .balance-val { color: var(--grn); font-weight: bold; font-family: monospace; font-size: 16px; }
        h3::before { content: '›'; color: var(--org); font-size: 24px; margin-right: 8px; font-weight: bold; }
        .card { background: var(--card); border: 1px solid var(--brd); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
        .price-list { border: 1px solid var(--brd); border-radius: 8px; overflow: hidden; }
        .price-item { display: flex; justify-content: space-between; padding: 14px; background: var(--card); border-bottom: 1px solid var(--brd); cursor: pointer; font-size: 14px; transition: 0.2s; }
        .price-item:hover { background: #21262d; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--brd); border-radius: 8px; overflow: hidden; border: 1px solid var(--brd); margin-top: 15px; }
        .btn { background: var(--card); border: none; padding: 12px; color: var(--gray); font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn:disabled { opacity: 0.3; }
        .hidden { display: none; }
        .val { font-family: monospace; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3 style="display:flex; align-items:center; margin:0; font-size:16px;">XUREl Panel</h3>
        <div style="text-align:right;">
            <div style="color:var(--gray); font-size:10px; font-weight:bold;">YOUR BALANCE</div>
            <div id="balDisplay" class="balance-val">Loading...</div>
        </div>
    </div>

    <div id="newOrder">
        <p style="font-size: 12px; color: var(--gray); margin-bottom: 10px;">New Order (Shopee ID)</p>
        <div id="priceContainer" class="price-list">
            <div style="padding:20px; text-align:center; font-size:12px;">Memuat Stok...</div>
        </div>
    </div>

    <div id="activeOrder" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <span id="dispId" style="color:var(--blue); font-weight:bold;">#00000</span>
                <span id="timer" style="color:var(--grn); font-family:monospace;">20:00</span>
            </div>
            <div style="font-size:11px; color:var(--gray);">PHONE:</div>
            <div id="dispPhone" class="val" style="margin-bottom:10px;">-</div>
            <div style="font-size:11px; color:var(--gray);">OTP:</div>
            <div id="dispOtp" class="val" style="color:var(--org);">Waiting...</div>

            <div class="action-grid">
                <button class="btn" id="btnDone" disabled>✓ Done</button>
                <button class="btn" id="btnResend" disabled>↺ Resend</button>
                <button class="btn" id="btnCancel" disabled>✕ Cancel</button>
                <button class="btn" id="btnReplace" disabled>⇄ Replace</button>
            </div>
        </div>
        <button onclick="location.reload()" style="width:100%; padding:10px; background:none; border:1px solid var(--brd); color:var(--gray); border-radius:8px; cursor:pointer;">+ NEW ORDER</button>
    </div>
</div>

<script>
    const WORKER = "https://smscode.aam-zip.workers.dev";
    let orderId = null, waitTime = 120, timeLeft = 1200, poller = null;

    async function init() {
        try {
            // Cek Saldo
            const bRes = await fetch(`${WORKER}/get-balance`);
            const bData = await bRes.json();
            document.getElementById('balDisplay').innerText = bData.idr ? `Rp ${bData.idr.toLocaleString()}` : "Rp 0";

            // Cek Harga & Stok
            const pRes = await fetch(`${WORKER}/get-prices`);
            const pData = await pRes.json();
            if (pData.length === 0) {
                document.getElementById('priceContainer').innerHTML = '<div style="padding:20px; text-align:center; font-size:12px; color:red;">Saldo Habis / Stok Kosong</div>';
                return;
            }
            document.getElementById('priceContainer').innerHTML = pData.map(i => `
                <div class="price-item" onclick="buy('${i.usd}', ${i.idr})">
                    <span>Shopee ID</span>
                    <span><b>Rp ${i.idr}</b> <small style="color:var(--gray); margin-left:8px;">${i.count} avail</small></span>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('priceContainer').innerHTML = '<div style="padding:20px; text-align:center; font-size:12px; color:red;">Gagal Terhubung ke API</div>';
        }
    }
    init();

    async function buy(usd, idr) {
        if(!confirm(`Beli seharga Rp ${idr}?`)) return;
        document.getElementById('newOrder').classList.add('hidden');
        document.getElementById('activeOrder').classList.remove('hidden');
        document.getElementById('dispPhone').innerText = "Ordering...";

        const res = await fetch(`${WORKER}/api?action=getNumber&usd=${usd}`);
        const text = await res.text();
        if(text.includes("ACCESS_NUMBER")) {
            const [_, id, phone] = text.split(':');
            orderId = id;
            document.getElementById('dispId').innerText = "#"+id;
            document.getElementById('dispPhone').innerText = phone;
            startTimers();
            startPolling();
        } else { alert(text); location.reload(); }
    }

    function startTimers() {
        setInterval(() => {
            timeLeft--; waitTime--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
            if(waitTime <= 0) {
                document.getElementById('btnCancel').disabled = false;
                document.getElementById('btnReplace').disabled = false;
                document.getElementById('btnCancel').style.color = "#f85149";
            }
        }, 1000);
    }

    function startPolling() {
        poller = setInterval(async () => {
            const res = await fetch(`${WORKER}/api?action=getStatus&id=${orderId}`);
            const text = await res.text();
            if(text.includes("STATUS_OK")) {
                document.getElementById('dispOtp').innerText = text.split(':')[1];
                document.getElementById('dispOtp').style.color = "#3fb950";
                document.getElementById('btnDone').disabled = false;
                document.getElementById('btnDone').style.color = "#3fb950";
                clearInterval(poller);
            } else { document.getElementById('dispOtp').innerText = text; }
        }, 5000);
    }

    document.getElementById('btnCancel').onclick = async () => { if(confirm("Cancel?")) { await fetch(`${WORKER}/api?action=setStatus&id=${orderId}&status=8`); location.reload(); }};
    document.getElementById('btnDone').onclick = async () => { await fetch(`${WORKER}/api?action=setStatus&id=${orderId}&status=6`); location.reload(); };
    document.getElementById('btnReplace').onclick = async () => { if(confirm("Replace?")) { await fetch(`${WORKER}/api?action=setStatus&id=${orderId}&status=1`); location.reload(); }};
</script>

</body>
</html>
