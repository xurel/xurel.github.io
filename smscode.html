<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XUREl - Shopee Panel</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --brd: #30363d; --text: #c9d1d9; --org: #ee4d2d; --grn: #3fb950; --blu: #58a6ff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--brd); }
        .bal-val { color: var(--grn); font-weight: bold; font-family: monospace; font-size: 18px; }
        .price-list { border: 1px solid var(--brd); border-radius: 10px; overflow: hidden; background: var(--card); }
        .price-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--brd); cursor: pointer; }
        .price-item:hover { background: #21262d; border-left: 4px solid var(--org); }
        .hidden { display: none; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--brd); border-radius: 8px; overflow: hidden; margin-top: 15px; }
        .btn { background: var(--card); border: none; padding: 12px; color: #8b949e; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3 style="margin:0; color:var(--org);">› XUREl Shopee</h3>
        <div style="text-align:right;">
            <div style="font-size:10px; color:#8b949e;">BALANCE (IDR)</div>
            <div id="balDisplay" class="bal-val">Loading...</div>
        </div>
    </div>

    <div id="newOrder">
        <div id="priceContainer" class="price-list">
            <div style="padding:40px; text-align:center;">Memuat Stok Shopee...</div>
        </div>
    </div>

    <div id="activeOrder" class="hidden">
        <div style="background:var(--card); border:1px solid var(--brd); border-radius:12px; padding:20px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <span id="dispId" style="color:var(--blu); font-weight:bold;">#ORDER</span>
                <span id="timer" style="color:var(--grn); font-family:monospace;">20:00</span>
            </div>
            <div style="font-size:11px; color:#8b949e;">NOMOR:</div>
            <div id="dispPhone" style="font-size:20px; font-weight:bold; color:var(--blu); margin-bottom:15px;">-</div>
            <div style="font-size:11px; color:#8b949e;">OTP:</div>
            <div id="dispOtp" style="font-size:24px; font-weight:bold; color:var(--org);">Menunggu...</div>
            <div class="btn-grid">
                <button class="btn" id="btnDone" disabled>✓ Done</button>
                <button class="btn" id="btnCancel" disabled>✕ Cancel</button>
            </div>
        </div>
        <button onclick="location.reload()" style="width:100%; padding:12px; margin-top:15px; background:none; border:1px solid var(--brd); color:#8b949e; border-radius:8px; cursor:pointer; font-weight:bold;">+ NEW ORDER</button>
    </div>
</div>

<script>
    const WORKER = "https://smscode.aam-zip.workers.dev";
    let orderId = null, waitTime = 120, poller, timer;

    async function init() {
        try {
            const bRes = await fetch(`${WORKER}/get-balance`);
            const bJson = await bRes.json();
            if(bJson.success) document.getElementById('balDisplay').innerText = `Rp ${bJson.data.balance.toLocaleString()}`;

            const pRes = await fetch(`${WORKER}/get-prices`);
            const pJson = await pRes.json();
            const container = document.getElementById('priceContainer');
            
            if(pJson.success && pJson.data.length > 0) {
                container.innerHTML = pJson.data.map(i => `
                    <div class="price-item" onclick="buy(${i.id}, ${i.price})">
                        <span>${i.name || 'Shopee ID'}</span>
                        <span><b>Rp ${i.price.toLocaleString()}</b> <small style="margin-left:8px;">${i.available} avail</small></span>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<div style="padding:40px; text-align:center; color:red;">Stok Kosong / API Error</div>`;
            }
        } catch (e) { 
            document.getElementById('priceContainer').innerHTML = `<div style="padding:40px; text-align:center; color:red;">Koneksi ke Worker Gagal</div>`;
        }
    }

    async function buy(pid, price) {
        if(!confirm(`Beli nomor seharga Rp ${price.toLocaleString()}?`)) return;
        
        document.getElementById('newOrder').classList.add('hidden');
        document.getElementById('activeOrder').classList.remove('hidden');
        document.getElementById('dispPhone').innerText = "Ordering...";

        try {
            const res = await fetch(`${WORKER}/create-order`, {
                method: "POST",
                headers: { "Content-Type": "application/json" }, // INI YANG SEBELUMNYA HILANG
                body: JSON.stringify({ product_id: pid })
            });
            const json = await res.json();
            
            if(json.success) {
                const order = json.data.orders[0];
                orderId = order.id;
                document.getElementById('dispId').innerText = "#" + order.id;
                document.getElementById('dispPhone').innerText = order.phone_number;
                startTimers();
                poller = setInterval(checkOtp, 5000);
            } else { 
                alert("Gagal Memesan: " + (json.error?.message || json.error || "Sistem Sibuk")); 
                location.reload(); 
            }
        } catch (e) {
            alert("Terjadi kesalahan jaringan.");
            location.reload();
        }
    }

    async function checkOtp() {
        try {
            const res = await fetch(`${WORKER}/get-active`);
            const json = await res.json();
            if(json.success) {
                const myOrder = json.data.find(o => o.id == orderId);
                if(myOrder && myOrder.otp_code) {
                    document.getElementById('dispOtp').innerText = myOrder.otp_code;
                    document.getElementById('dispOtp').style.color = "var(--grn)";
                    document.getElementById('btnDone').disabled = false;
                    document.getElementById('btnDone').style.color = "var(--grn)";
                    clearInterval(poller);
                }
            }
        } catch(e) {}
    }

    function startTimers() {
        timer = setInterval(() => {
            waitTime--;
            if(waitTime <= 0) {
                document.getElementById('btnCancel').disabled = false;
                document.getElementById('btnCancel').style.color = "#f85149";
                document.getElementById('btnCancel').innerText = "✕ Cancel";
                clearInterval(timer);
            } else {
                document.getElementById('btnCancel').innerText = `✕ Cancel (${waitTime}s)`;
            }
        }, 1000);
    }

    // Fungsi Tombol Action
    document.getElementById('btnCancel').onclick = () => sendAction('cancel');
    document.getElementById('btnDone').onclick = () => sendAction('finish');

    async function sendAction(act) {
        if(act === 'cancel' && !confirm("Batalkan pesanan ini? Saldo akan kembali.")) return;
        try {
            const res = await fetch(`${WORKER}/order-action`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: orderId, action: act })
            });
            const json = await res.json();
            if(json.success) {
                alert(act === 'cancel' ? "Pesanan dibatalkan." : "Pesanan Selesai!");
                location.reload();
            } else {
                alert("Gagal: " + (json.error?.message || json.error));
            }
        } catch (e) { alert("Error jaringan."); }
    }

    init();
</script>
</body>
</html>
