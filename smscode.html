<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XUREl - Home</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --brd: #30363d; --text: #c9d1d9; --org: #ee4d2d; --grn: #3fb950; --blu: #58a6ff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; }
        
        .container { width: 90%; max-width: 420px; background: var(--card); border: 1px solid var(--brd); border-radius: 16px; padding: 25px; margin-top: 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: slideInPage 0.5s ease; }
        @keyframes slideInPage { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--brd); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .icon-btn { color: #8b949e; display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; text-decoration: none; }
        .icon-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .icon-btn:active { transform: scale(0.95); }
        .bal-container { background: #21262d; border: 1px solid var(--brd); padding: 6px 14px; border-radius: 10px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.15), 0 2px 5px rgba(0,0,0,0.1); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .bal-val { color: var(--grn); font-weight: bold; font-family: monospace; font-size: 16px; letter-spacing: 0.5px; }

        /* DAFTAR HARGA & KARTU PESANAN */
        .price-list { border: 1px solid var(--brd); border-radius: 10px; overflow: hidden; background: var(--bg); margin-bottom: 20px; }
        .price-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--brd); cursor: pointer; transition: 0.2s; }
        .price-item:hover { background: #21262d; border-left: 4px solid var(--org); padding-left: 19px; }
        .price-item:last-child { border-bottom: none; }
        .order-card { background: var(--bg); border: 1px solid var(--brd); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        
        /* ANIMASI LOADING OTP */
        .loader-bars { display: flex; align-items: center; gap: 4px; height: 20px; padding-left: 2px; }
        .loader-bars span { display: block; width: 4px; height: 100%; background-color: #8b949e; border-radius: 2px; animation: bounceBar 1.2s infinite ease-in-out; }
        .loader-bars span:nth-child(1) { animation-delay: -0.24s; }
        .loader-bars span:nth-child(2) { animation-delay: -0.12s; }
        .loader-bars span:nth-child(3) { animation-delay: 0s; }
        @keyframes bounceBar { 0%, 40%, 100% { transform: scaleY(0.4); opacity: 0.5; } 20% { transform: scaleY(1); opacity: 1; background-color: var(--blu); } }
        
        .phone-box { font-size: 24px; font-weight: bold; color: var(--text); margin-bottom: 20px; font-family: monospace; letter-spacing: 2px; cursor: pointer; padding: 8px; border-radius: 6px; transition: 0.2s; }
        .phone-box:active { background: var(--brd); color: var(--blu); }
        
        .btn-grid-4 { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
        .btn-action { flex: 1 1 calc(50% - 8px); background: var(--card); border: 1px solid var(--brd); border-radius: 8px; padding: 12px; color: #8b949e; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; text-align: center; }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-action:not(:disabled):hover { background: #21262d; color: #fff; border-color: #8b949e; }
        
        .section-title { font-size: 12px; color: #8b949e; margin-bottom: 12px; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; padding-left: 2px; }
        .status-badge { background: rgba(88, 166, 255, 0.1); color: var(--blu); padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }

        /* CUSTOM POPUP (MODAL) PREMIUM */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: var(--card); border: 1px solid var(--brd); border-radius: 16px; padding: 25px; width: 85%; max-width: 320px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); transform: scale(0.95) translateY(10px); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }
        .modal-title { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 10px; }
        .modal-msg { font-size: 14px; color: #8b949e; margin-bottom: 25px; line-height: 1.5; }
        .modal-btn-wrap { display: flex; gap: 10px; justify-content: flex-end; }
        .m-btn { padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .m-btn-cancel { background: var(--bg); border: 1px solid var(--brd); color: #8b949e; }
        .m-btn-cancel:hover { color: #fff; background: var(--brd); }
        .m-btn-confirm { background: var(--blu); color: #fff; }
        .m-btn-confirm:hover { filter: brightness(1.2); }
        .m-btn-danger { background: var(--org); color: #fff; }
        .m-btn-danger:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <a href="#" class="icon-btn" onclick="location.reload(); return false;" title="Home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </a>
            <a href="https://xurel.github.io/smsnotes.html" target="_blank" class="icon-btn" title="Catatan">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </a>
        </div>
        <div style="text-align:right;">
            <div class="bal-container">
                <div id="balDisplay" class="bal-val">...</div>
            </div>
        </div>
    </div>

    <div id="activeOrdersContainer"></div>

    <div class="section-title">PESAN NOMOR BARU</div>
    <div class="price-list" id="priceContainer">
        <div style="padding:40px; text-align:center; color:#8b949e;">Memuat stok Shopee...</div>
    </div>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-box">
        <div class="modal-title" id="modalTitle">Konfirmasi</div>
        <div class="modal-msg" id="modalMsg">Pesan di sini</div>
        <div class="modal-btn-wrap" id="modalActions">
            </div>
    </div>
</div>

<script>
    const WORKER = "https://smscode.aam-zip.workers.dev";

    // --- SISTEM CUSTOM POPUP (MENGGANTIKAN ALERT & CONFIRM) ---
    function showModal(title, message, type = 'alert') {
        return new Promise((resolve) => {
            const overlay = document.getElementById('customModal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMsg').innerText = message;
            
            const actionsDiv = document.getElementById('modalActions');
            actionsDiv.innerHTML = ''; // Bersihkan tombol lama

            if (type === 'confirm' || type === 'danger') {
                const btnCancel = document.createElement('button');
                btnCancel.className = 'm-btn m-btn-cancel';
                btnCancel.innerText = 'Batal';
                btnCancel.onclick = () => { overlay.classList.remove('active'); resolve(false); };
                
                const btnOk = document.createElement('button');
                btnOk.className = type === 'danger' ? 'm-btn m-btn-danger' : 'm-btn m-btn-confirm';
                btnOk.innerText = 'Lanjutkan';
                btnOk.onclick = () => { overlay.classList.remove('active'); resolve(true); };
                
                actionsDiv.appendChild(btnCancel);
                actionsDiv.appendChild(btnOk);
            } else {
                // Tipe Alert biasa
                const btnOk = document.createElement('button');
                btnOk.className = 'm-btn m-btn-confirm';
                btnOk.innerText = 'Tutup';
                btnOk.onclick = () => { overlay.classList.remove('active'); resolve(true); };
                actionsDiv.appendChild(btnOk);
            }
            
            overlay.classList.add('active');
        });
    }
    // ------------------------------------------------------------

    async function init() {
        updateBalance();
        loadPrices();
        pollActiveOrders();
        setInterval(pollActiveOrders, 5000);
        setInterval(updateTimers, 1000);
    }

    async function updateBalance() {
        try {
            const res = await fetch(`${WORKER}/get-balance`);
            const json = await res.json();
            if(json.success) document.getElementById('balDisplay').innerText = `Rp ${json.data.balance.toLocaleString('id-ID')}`;
        } catch(e) {}
    }

    async function loadPrices() {
        try {
            const res = await fetch(`${WORKER}/get-prices`);
            const json = await res.json();
            const container = document.getElementById('priceContainer');
            if (json.success && json.data.length > 0) {
                container.innerHTML = json.data.map(i => `
                    <div class="price-item" onclick="buy(${i.id}, ${i.price}, '${i.name}')">
                        <div>
                            <div style="font-weight:bold; font-size:14px; color:#fff; margin-bottom:2px;">${i.name}</div>
                            <div style="color:var(--grn); font-size:13px; font-weight:bold; font-family:monospace;">Rp ${i.price.toLocaleString('id-ID')}</div>
                        </div>
                        <div style="text-align:right;">
                            <span style="background: rgba(139, 148, 158, 0.1); padding: 4px 8px; border-radius: 6px; font-size: 11px; color: #8b949e; font-weight: bold;">${i.available} stok</span>
                        </div>
                    </div>`).join('');
            } else { container.innerHTML = '<div style="padding:40px; text-align:center; color:#8b949e;">Stok Kosong</div>'; }
        } catch (e) { document.getElementById('priceContainer').innerHTML = '<div style="padding:40px; text-align:center; color:var(--org);">Gagal Memuat Stok</div>'; }
    }

    async function buy(pid, price, name) {
        // Menggunakan Custom Popup
        const isConfirmed = await showModal("Pesanan Baru", `Anda akan membeli nomor untuk ${name} seharga Rp ${price.toLocaleString('id-ID')}. Saldo Anda akan otomatis terpotong.`, "confirm");
        if(!isConfirmed) return;
        
        try {
            const res = await fetch(`${WORKER}/create-order`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ product_id: pid })
            });
            const json = await res.json();
            if(json.success) {
                const order = json.data.orders[0];
                localStorage.setItem('phone_' + order.id, order.phone_number);
                localStorage.setItem('timer_' + order.id, Date.now() + (20 * 60 * 1000));
                pollActiveOrders();
                updateBalance();
            } else { 
                showModal("Pemesanan Gagal", json.error.message || "Gagal memesan stok. Coba lagi nanti.", "alert"); 
            }
        } catch (e) {
            showModal("Kesalahan", "Terjadi masalah jaringan saat menghubungi server pusat.", "alert");
        }
    }

    async function pollActiveOrders() {
        try {
            const res = await fetch(`${WORKER}/get-active`);
            const json = await res.json();
            if(json.success) renderOrders(json.data);
        } catch(e) {} 
    }

    function renderOrders(orders) {
        const container = document.getElementById('activeOrdersContainer');
        const activeIds = orders ? orders.map(o => 'order-' + o.id) : [];
        Array.from(container.children).forEach(child => {
            if (!activeIds.includes(child.id)) child.remove();
        });

        if (!orders || orders.length === 0) return;

        orders.forEach(o => {
            const savedPhone = localStorage.getItem('phone_' + o.id);
            const phone = o.phone || savedPhone || 'Mencari Nomor...';
            if(o.phone && !savedPhone) localStorage.setItem('phone_' + o.id, o.phone);
            
            if(!localStorage.getItem('timer_' + o.id)) {
                let expireTime;
                if (o.expires_at || o.expire_at || o.expired_at) expireTime = new Date(o.expires_at || o.expire_at || o.expired_at).getTime();
                else if (o.created_at || o.createdAt || o.date) expireTime = new Date(o.created_at || o.createdAt || o.date).getTime() + (20 * 60 * 1000);
                else expireTime = Date.now() + (20 * 60 * 1000); 
                localStorage.setItem('timer_' + o.id, expireTime);
            }

            const endTimeStr = localStorage.getItem('timer_' + o.id);
            let passed2Mins = false;
            if (endTimeStr) {
                const remaining = Math.floor((parseInt(endTimeStr) - Date.now()) / 1000);
                if (remaining <= 1080) passed2Mins = true;
            }

            let otpDisplay = o.otp_code 
                ? `<div style="font-size:26px; font-weight:bold; color:var(--grn); font-family:monospace; letter-spacing:4px; animation: slideInPage 0.3s ease;">${o.otp_code}</div>` 
                : `<div class="loader-bars"><span></span><span></span><span></span></div>`;
            
            const existingCard = document.getElementById('order-' + o.id);
            if (existingCard) {
                const phoneBox = existingCard.querySelector('.phone-box');
                if (phoneBox.innerText !== phone && phone !== 'Mencari Nomor...') {
                    phoneBox.innerText = phone;
                    phoneBox.setAttribute('onclick', `copyText('${phone}', this)`);
                }
                const otpContainer = existingCard.querySelector('.otp-container');
                if (otpContainer.innerHTML.trim() !== otpDisplay.trim()) otpContainer.innerHTML = otpDisplay;
                
                if (o.otp_code) {
                    const btnDone = existingCard.querySelector('.btn-done');
                    if(btnDone && btnDone.disabled) { btnDone.disabled = false; btnDone.style.color = "var(--grn)"; btnDone.style.borderColor = "var(--grn)"; }
                    const btnResend = existingCard.querySelector('.btn-resend');
                    if(btnResend && btnResend.disabled) btnResend.disabled = false;
                }
            } else {
                const resendState = o.otp_code ? '' : 'disabled';
                const cancelReplaceState = passed2Mins ? '' : 'disabled';
                
                const cardHTML = `
                <div class="order-card" id="order-${o.id}" style="animation: slideInPage 0.4s ease;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px dashed var(--brd); padding-bottom:10px; align-items:center;">
                        <span style="color:var(--grn); font-weight:bold; font-family:monospace; font-size:14px;">#${o.id} <span class="status-badge">ACTIVE</span></span>
                        <span class="timer-display" data-id="${o.id}" style="color:var(--blu); font-weight:bold; font-family:monospace; font-size:14px; letter-spacing:0.5px;">--:--</span>
                    </div>
                    <div style="font-size:11px; color:#8b949e; margin-bottom:5px; letter-spacing:0.5px;">TAP UNTUK SALIN:</div>
                    <div class="phone-box" onclick="copyText('${phone}', this)">${phone}</div>
                    <div style="font-size:11px; color:#8b949e; margin-bottom:5px; letter-spacing:0.5px;">OTP:</div>
                    <div class="otp-container" style="min-height:35px; display:flex; align-items:center;">
                        ${otpDisplay}
                    </div>
                    <div class="btn-grid-4">
                        <button class="btn-action btn-done" onclick="act('finish', ${o.id})" ${o.otp_code?'style="color:var(--grn); border-color:var(--grn);"':'disabled'}>✓ DONE</button>
                        <button class="btn-action btn-resend" id="btn-resend-${o.id}" onclick="act('resend', ${o.id})" ${resendState}>↻ RESEND</button>
                        <button class="btn-action btn-cancel" id="btn-cancel-${o.id}" onclick="act('cancel', ${o.id})" ${cancelReplaceState}>✕ CANCEL</button>
                        <button class="btn-action btn-replace" id="btn-replace-${o.id}" onclick="act('replace', ${o.id})" ${cancelReplaceState}>⇄ REPLACE</button>
                    </div>
                </div>`;
                container.insertAdjacentHTML('afterbegin', cardHTML);
            }
        });
    }

    function updateTimers() {
        document.querySelectorAll('.timer-display').forEach(el => {
            const id = el.dataset.id;
            const endTime = localStorage.getItem('timer_' + id);
            if(endTime) {
                const diffSecs = Math.max(0, Math.floor((parseInt(endTime) - Date.now()) / 1000));
                el.innerText = `${Math.floor(diffSecs/60)}:${(diffSecs%60).toString().padStart(2, '0')}`;
                if (diffSecs < 180) el.style.color = "var(--org)";
                
                if (diffSecs <= 1080) {
                    const btnCancel = document.getElementById('btn-cancel-' + id);
                    const btnReplace = document.getElementById('btn-replace-' + id);
                    if(btnCancel && btnCancel.disabled) btnCancel.disabled = false;
                    if(btnReplace && btnReplace.disabled) btnReplace.disabled = false;
                }
            }
        });
    }

    function copyText(txt, el) {
        if(txt.includes('Mencari')) return;
        navigator.clipboard.writeText(txt);
        const oldText = el.innerText;
        el.innerText = "COPIED!";
        el.style.color = "var(--grn)";
        setTimeout(() => { el.innerText = oldText; el.style.color = "var(--text)"; }, 1500);
    }

    async function act(a, id) {
        // Menggunakan Custom Popup untuk Aksi
        let title = "Konfirmasi Aksi";
        let msg = "Lanjutkan?";
        let popupType = "confirm";
        
        if(a === 'cancel') { title = "Batalkan Pesanan"; msg = "Yakin ingin membatalkan pesanan ini? Saldo akan dikembalikan secara otomatis."; popupType = "danger"; }
        if(a === 'replace') { title = "Ganti Nomor"; msg = "Batalkan pesanan ini dan ganti dengan nomor baru?"; }
        if(a === 'resend') { title = "Kirim Ulang OTP"; msg = "Apakah Anda ingin meminta kode OTP baru ke nomor ini?"; }
        if(a === 'finish') { title = "Selesaikan"; msg = "Konfirmasi bahwa pesanan ini telah selesai."; }
        
        const isConfirmed = await showModal(title, msg, popupType);
        if(!isConfirmed) return;

        try {
            const res = await fetch(`${WORKER}/order-action`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ id: id, action: a })
            });
            
            const text = await res.text();
            let json;
            try { json = JSON.parse(text); } catch(e) { json = { success: false, error: { message: "Respons API pusat tidak valid atau server sedang sibuk." } }; }
            
            if(json.success) {
                if(a === 'cancel' || a === 'finish' || a === 'replace') {
                    localStorage.removeItem('phone_' + id);
                    localStorage.removeItem('timer_' + id);
                }
                pollActiveOrders(); 
                updateBalance();
            } else { 
                showModal("Gagal Eksekusi", json.error?.message || json.error || "Aksi ditolak oleh server.", "alert"); 
            }
        } catch (e) { 
            showModal("Kesalahan", "Terjadi masalah jaringan saat mengirim perintah ke server.", "alert"); 
        }
    }

    init();
</script>
</body>
</html>
