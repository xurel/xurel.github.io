<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XUREl - Shopee Panel</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --brd: #30363d; --text: #c9d1d9; --org: #ee4d2d; --grn: #3fb950; --blu: #58a6ff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 400px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--brd); }
        .bal-val { color: var(--grn); font-weight: bold; font-family: monospace; font-size: 18px; }
        .price-list { border: 1px solid var(--brd); border-radius: 10px; overflow: hidden; background: var(--card); margin-bottom: 20px; }
        .price-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--brd); cursor: pointer; transition: 0.2s; }
        .price-item:hover { background: #21262d; border-left: 4px solid var(--org); }
        
        .order-card { background: var(--card); border: 1px solid var(--brd); border-radius: 12px; padding: 20px; margin-bottom: 20px; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Animasi Garis Loading OTP */
        .loader-bars { display: flex; align-items: center; gap: 4px; height: 20px; padding-left: 2px; }
        .loader-bars span { display: block; width: 4px; height: 100%; background-color: #8b949e; border-radius: 2px; animation: bounceBar 1.2s infinite ease-in-out; }
        .loader-bars span:nth-child(1) { animation-delay: -0.24s; }
        .loader-bars span:nth-child(2) { animation-delay: -0.12s; }
        .loader-bars span:nth-child(3) { animation-delay: 0s; }
        @keyframes bounceBar { 0%, 40%, 100% { transform: scaleY(0.4); opacity: 0.5; } 20% { transform: scaleY(1); opacity: 1; background-color: var(--blu); } }
        
        .phone-box { font-size: 24px; font-weight: bold; color: var(--text); margin-bottom: 20px; font-family: monospace; letter-spacing: 2px; cursor: pointer; padding: 8px; border-radius: 6px; }
        .phone-box:active { background: var(--brd); }
        
        .btn-grid-4 { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
        .btn { flex: 1 1 calc(50% - 8px); background: var(--bg); border: 1px solid var(--brd); border-radius: 8px; padding: 12px; color: #8b949e; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; text-align: center; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; } /* Efek transparan saat tombol redup */
        .btn:not(:disabled):hover { background: #21262d; color: #fff; }
        
        .status-badge { background: rgba(88, 166, 255, 0.1); color: var(--blu); padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3 style="margin:0; color:var(--org); font-size: 18px;">› XUREl Shopee</h3>
        <div style="text-align:right;">
            <div style="font-size:10px; color:#8b949e; font-weight: bold;">SALDO (IDR)</div>
            <div id="balDisplay" class="bal-val">...</div>
        </div>
    </div>

    <div id="activeOrdersContainer"></div>

    <div style="font-size: 12px; color: #8b949e; margin-bottom: 10px; font-weight: bold;">PESAN NOMOR BARU</div>
    <div class="price-list" id="priceContainer">
        <div style="padding:40px; text-align:center; color:#8b949e;">Memuat stok Shopee...</div>
    </div>
</div>

<script>
    const WORKER = "https://smscode.aam-zip.workers.dev";

    async function init() {
        updateBalance();
        loadPrices();
        pollActiveOrders();
        setInterval(pollActiveOrders, 5000);
        setInterval(updateTimers, 1000);
    }

    async function updateBalance() {
        try {
            const res = await fetch(`${WORKER}/get-balance`);
            const json = await res.json();
            if(json.success) document.getElementById('balDisplay').innerText = `Rp ${json.data.balance.toLocaleString('id-ID')}`;
        } catch(e) {}
    }

    async function loadPrices() {
        try {
            const res = await fetch(`${WORKER}/get-prices`);
            const json = await res.json();
            const container = document.getElementById('priceContainer');
            if (json.success && json.data.length > 0) {
                container.innerHTML = json.data.map(i => `
                    <div class="price-item" onclick="buy(${i.id}, ${i.price})">
                        <div>
                            <div style="font-weight:bold; font-size:14px; color:#fff;">${i.name}</div>
                            <div style="color:var(--grn); font-size:13px;">Rp ${i.price.toLocaleString('id-ID')}</div>
                        </div>
                        <div style="font-size:11px; color:#8b949e;">${i.available} stok</div>
                    </div>`).join('');
            }
        } catch (e) {}
    }

    async function buy(pid, price) {
        if(!confirm(`Beli nomor seharga Rp ${price.toLocaleString('id-ID')}?`)) return;
        try {
            const res = await fetch(`${WORKER}/create-order`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ product_id: pid })
            });
            const json = await res.json();
            if(json.success) {
                const order = json.data.orders[0];
                localStorage.setItem('phone_' + order.id, order.phone_number);
                localStorage.setItem('timer_' + order.id, Date.now() + (20 * 60 * 1000));
                pollActiveOrders();
                updateBalance();
            } else { alert(json.error.message || "Gagal memesan stok."); }
        } catch (e) {}
    }

    async function pollActiveOrders() {
        try {
            const res = await fetch(`${WORKER}/get-active`);
            const json = await res.json();
            if(json.success) renderOrders(json.data);
        } catch(e) {} 
    }

    function renderOrders(orders) {
        const container = document.getElementById('activeOrdersContainer');
        if (!orders || orders.length === 0) { container.innerHTML = ''; return; }

        container.innerHTML = orders.map(o => {
            const savedPhone = localStorage.getItem('phone_' + o.id);
            const phone = o.phone || savedPhone || 'Mencari Nomor...';
            
            if(o.phone && !savedPhone) localStorage.setItem('phone_' + o.id, o.phone);
            
            if(!localStorage.getItem('timer_' + o.id)) {
                localStorage.setItem('timer_' + o.id, Date.now() + (20 * 60 * 1000));
            }

            const endTimeStr = localStorage.getItem('timer_' + o.id);
            let passed2Mins = false;
            if (endTimeStr) {
                const remaining = Math.floor((parseInt(endTimeStr) - Date.now()) / 1000);
                if (remaining <= 1080) passed2Mins = true;
            }

            // Animasi Garis atau Tampilan Kode OTP
            let otpDisplay = '';
            if (o.otp_code) {
                otpDisplay = `<div style="font-size:24px; font-weight:bold; color:var(--grn); font-family:monospace; letter-spacing:2px;">${o.otp_code}</div>`;
            } else {
                otpDisplay = `
                <div class="loader-bars">
                    <span></span><span></span><span></span>
                </div>`;
            }
            
            // Logika disabled (meredupkan tombol alih-alih menyembunyikannya)
            const resendState = o.otp_code ? '' : 'disabled';
            const cancelReplaceState = passed2Mins ? '' : 'disabled';
            
            return `
            <div class="order-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px dashed var(--brd); padding-bottom:10px; align-items:center;">
                    <span style="color:var(--grn); font-weight:bold; font-family:monospace;">#${o.id} <span class="status-badge">ACTIVE</span></span>
                    <span class="timer-display" data-id="${o.id}" style="color:var(--blu); font-weight:bold; font-family:monospace; font-size:14px;">--:--</span>
                </div>
                <div style="font-size:11px; color:#8b949e; margin-bottom:5px;">KLIK UNTUK SALIN:</div>
                <div class="phone-box" onclick="copyText('${phone}', this)">${phone}</div>
                <div style="font-size:11px; color:#8b949e; margin-bottom:5px;">OTP:</div>
                <div style="min-height:35px; display:flex; align-items:center;">
                    ${otpDisplay}
                </div>
                <div class="btn-grid-4">
                    <button class="btn" onclick="act('finish', ${o.id})" ${o.otp_code?'style="color:var(--grn); border-color:var(--grn);"':'disabled'}>✓ DONE</button>
                    <button class="btn" id="btn-resend-${o.id}" onclick="act('resend', ${o.id})" ${resendState}>↻ RESEND</button>
                    <button class="btn" id="btn-cancel-${o.id}" onclick="act('cancel', ${o.id})" ${cancelReplaceState}>✕ CANCEL</button>
                    <button class="btn" id="btn-replace-${o.id}" onclick="act('replace', ${o.id})" ${cancelReplaceState}>⇄ REPLACE</button>
                </div>
            </div>`;
        }).join('');
    }

    // Fungsi Timer Sekaligus Mengaktifkan Tombol
    function updateTimers() {
        document.querySelectorAll('.timer-display').forEach(el => {
            const id = el.dataset.id;
            const endTime = localStorage.getItem('timer_' + id);
            if(endTime) {
                const diffSecs = Math.max(0, Math.floor((parseInt(endTime) - Date.now()) / 1000));
                const m = Math.floor(diffSecs / 60);
                const s = diffSecs % 60;
                el.innerText = `${m}:${s.toString().padStart(2, '0')}`;
                
                if (diffSecs < 180) el.style.color = "var(--org)";
                
                // MENGHIDUPKAN TOMBOL: Jika sisa waktu <= 18:00 (lewat 2 menit), hapus status disabled
                if (diffSecs <= 1080) {
                    const btnCancel = document.getElementById('btn-cancel-' + id);
                    const btnReplace = document.getElementById('btn-replace-' + id);
                    if(btnCancel) btnCancel.disabled = false;
                    if(btnReplace) btnReplace.disabled = false;
                }
            }
        });
    }

    function copyText(txt, el) {
        if(txt.includes('Mencari')) return;
        navigator.clipboard.writeText(txt);
        const oldText = el.innerText;
        el.innerText = "COPIED!";
        el.style.color = "var(--grn)";
        setTimeout(() => { el.innerText = oldText; el.style.color = "var(--text)"; }, 1500);
    }

    async function act(a, id) {
        let msg = "Lanjutkan?";
        if(a === 'cancel') msg = "Yakin ingin membatalkan pesanan ini?";
        if(a === 'replace') msg = "Ganti dengan nomor baru sekarang?";
        if(a === 'resend') msg = "Kirim ulang SMS OTP ke nomor ini?";
        if(a === 'finish') msg = "Selesaikan pesanan?";
        
        if(!confirm(msg)) return;

        try {
            const res = await fetch(`${WORKER}/order-action`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ id: id, action: a })
            });
            const json = await res.json();
            
            if(json.success) {
                if(a === 'cancel' || a === 'finish' || a === 'replace') {
                    localStorage.removeItem('phone_' + id);
                    localStorage.removeItem('timer_' + id);
                }
                document.getElementById('activeOrdersContainer').innerHTML = '';
                pollActiveOrders();
                updateBalance();
            } else { 
                alert("Gagal: " + (json.error?.message || json.error || "Aksi ditolak server.")); 
            }
        } catch (e) {
            alert("Terjadi kesalahan jaringan.");
        }
    }

    init();
</script>
</body>
</html>
