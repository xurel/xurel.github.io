<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xurel - Link Shopee</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            min-height: 100vh;
            background: linear-gradient(120deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1, #84fab0, #8fd3f4);
            background-size: 300% 300%;
            animation: gradientBackground 15s ease infinite;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- TOOLBAR --- */
        .toolbar {
            width: 100%; background: rgba(255, 255, 255, 0.95);
            padding: 8px 15px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-links { display: flex; align-items: center; gap: 5px; }
        
        .nav-item {
            text-decoration: none; color: #555; 
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px;
            border-radius: 12px; transition: 0.3s;
        }
        
        .nav-item i { font-size: 1.2em; text-align: center; }

        .nav-item:hover, .nav-item.active { 
            color: #ff6b6b; 
            background: rgba(255, 107, 107, 0.1); 
        }

        .nav-divider {
            width: 1.5px; height: 22px; background: #e0e0e0; margin: 0 4px;
        }

        .auth-container { position: relative; }
        
        .login-popup {
            display: none; position: absolute; top: 50px; right: 0;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 240px; 
            flex-direction: column; gap: 10px; z-index: 1001;
        }
        
        .login-popup input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        
        .remember-container {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.85em; color: #666; cursor: pointer;
        }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            background: white; padding: 25px; border-radius: 15px; margin: 20px 0;
            width: 90%; max-width: 600px; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .admin-input, .admin-select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #eee; border-radius: 8px; background: #f9f9f9; outline: none;}
        .btn-add { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; margin-top: 10px; }

        /* --- GENERATE NAMA PANEL --- */
        .generate-container {
            width: 95%; max-width: 700px;
            background: rgba(255, 255, 255, 0.9); border-radius: 25px;
            padding: 25px 30px; margin: 25px 0 5px 0; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .generate-box { 
            display: flex; gap: 15px; justify-content: center; align-items: stretch; width: 100%; 
        }
        .generate-box input {
            flex: 1; padding: 15px; border: 2px solid #ddd; border-radius: 15px;
            font-size: 1.05em; font-weight: bold; color: #444; text-align: center; outline: none; background: #f8f9fa;
        }
        .generate-box button {
            background: #54a0ff; color: white; border: none; padding: 15px 25px;
            border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap; font-size: 1.05em;
        }
        .generate-box button:hover { background: #2e86de; transform: translateY(-2px); }

        /* --- MENU CONTENT --- */
        .container {
            flex: 1; width: 95%; max-width: 700px; text-align: center;
            background: rgba(255, 255, 255, 0.9); border-radius: 25px;
            padding: 30px; margin: 20px 0 30px 0; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .menu-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px; }
        .menu-wrapper { 
            position: relative; flex: 1 1 calc(50% - 15px); min-width: 140px; 
            overflow: hidden; border-radius: 15px; transition: 0.3s;
            display: flex; align-items: center;
        }
        
        .menu-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; min-height: 65px; 
            padding: 12px 20px; 
            border-radius: 15px; font-weight: 600;
            text-decoration: none; color: white; transition: 0.3s;
            font-size: 0.95em; 
            text-align: center;
            gap: 5px; 
        }
        .menu-item:hover { transform: translateY(-3px); }

        .details-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px; 
        }

        .price-text {
            font-size: 0.8em;
            font-weight: 400;
            background: rgba(0, 0, 0, 0.15); 
            padding: 2px 8px;
            border-radius: 10px;
        }

        .status-badge {
            font-size: 0.8em;
            font-weight: 700;
            background: rgba(231, 76, 60, 0.9); 
            color: white; 
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase; 
        }

        .edit-mode-container {
            background: #fff; border-radius: 15px; padding: 12px; width: 100%;
            display: flex; flex-direction: column; gap: 8px; border: 2px solid #ff6b6b;
        }
        .edit-mode-container input, .edit-mode-container select { padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 0.85em; width: 100%; }

        .admin-controls { position: absolute; bottom: 5px; left: 8px; display: flex; gap: 4px; z-index: 10; }
        .btn-ctrl {
            background: rgba(0,0,0,0.2); color: white; border: none;
            width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
        }
        
        footer { width: 100%; padding: 20px; background: rgba(255,255,255,0.8); text-align: center; color: #666; margin-top: auto; }
        .badge-new { position: absolute; top: 4px; right: 4px; background: #ff4757; color: white; font-size: 8px; padding: 2px 7px; border-radius: 10px; font-weight: bold; z-index: 2; }

        @media (max-width: 480px) { 
            .menu-wrapper { flex: 1 1 100%; }
            .generate-box { flex-direction: column; }
            .generate-box button { width: 100%; justify-content: center; }
            .generate-container { padding: 20px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

    <nav class="toolbar">
        <div class="nav-links">
            <a href="https://muzans.github.io/" class="nav-item active"><i class="fa-solid fa-house"></i></a>
            <a href="https://xurel.github.io/notes.html" class="nav-item"><i class="fa-solid fa-note-sticky"></i></a>
            <div class="nav-divider"></div>
        </div>
        <div class="auth-container" id="auth-wrapper">
            <button onclick="toggleLoginForm(event)" style="background:none; color:#555; border:1px solid #ddd; padding:8px 12px; border-radius:20px; cursor:pointer"><i class="fa-solid fa-user-lock"></i> Login</button>
            <div class="login-popup" id="login-popup">
                <input type="email" id="email" placeholder="Email Admin">
                <input type="password" id="password" placeholder="Password">
                <label class="remember-container">
                    <input type="checkbox" id="rememberMe"> Ingat Saya
                </label>
                <button class="btn-add" onclick="login()">Masuk</button>
            </div>
            <button id="btn-logout" style="display:none; background: #ff4757; color:white; border:none; padding:8px 15px; border-radius:20px; cursor:pointer" onclick="logout()"><i class="fa-solid fa-power-off"></i> Logout</button>
        </div>
    </nav>

    <div id="admin-panel">
        <h3 style="margin-bottom:10px">Tambah Link Shopee</h3>
        <input type="text" id="title" class="admin-input" placeholder="Nama Produk">
        <input type="text" id="url" class="admin-input" placeholder="URL Link">
        <input type="text" id="price" class="admin-input" placeholder="Harga (Misal: 150000)" oninput="formatRupiah(this)">
        <select id="status" class="admin-select">
            <option value="">-- Tanpa Label (Opsional) --</option>
            <option value="STAR">Star</option>
            <option value="MALL">Mall</option>
        </select>
        <button class="btn-add" onclick="addMenu()">Terbitkan</button>
    </div>

    <div class="generate-container">
        <div class="generate-box">
            <input type="text" id="generatedNameOutput" placeholder="---" readonly>
            <button id="btn-generate" onclick="generateAndCopy()"><i class="fa-solid fa-shuffle"></i> Acak Nama</button>
        </div>
    </div>

    <div class="container">
        <h2 style="color: #444; margin-bottom: 5px;">LINK SHOPEE</h2>
        <div id="menu-container" class="menu-list"></div>
    </div>

    <footer>
        <p>&copy; 2026 Xurel - Muzans Developer • Link Shopee Edition</p>
    </footer>

    <script>
        // --- LOGIKA GENERATE NAMA ---
        let listFirstNames = [];
        let listLastNames = [];

        // Mengambil data JSON dari GitHub
        fetch('https://raw.githubusercontent.com/muzans/muzans.github.io/main/base.json')
            .then(response => response.json())
            .then(data => {
                listFirstNames = data.FirstNames || [];
                // Jika LastNames ada, pakai itu. Jika belum ada, pinjam dari FirstNames
                listLastNames = data.LastNames || data.FirstNames || []; 
            })
            .catch(error => console.error('Gagal mengambil data nama:', error));

        function generateAndCopy() {
            if (listFirstNames.length === 0) {
                alert("Data sedang dimuat dari server, silakan coba beberapa detik lagi.");
                return;
            }

            // Mengacak nama dengan sistem Math.random tingkat tinggi
            const randomFirst = listFirstNames[Math.floor(Math.random() * listFirstNames.length)];
            let randomLast = listLastNames[Math.floor(Math.random() * listLastNames.length)];
            
            // Memastikan nama belakang tidak sama persis dengan nama depan
            while (randomFirst === randomLast && listLastNames.length > 1) {
                randomLast = listLastNames[Math.floor(Math.random() * listLastNames.length)];
            }

            const fullName = `${randomFirst} ${randomLast}`;

            // Menampilkan hasil
            const inputOutput = document.getElementById('generatedNameOutput');
            inputOutput.value = fullName;

            // Menyalin ke Clipboard
            navigator.clipboard.writeText(fullName).then(() => {
                const btn = document.getElementById('btn-generate');
                const originalText = '<i class="fa-solid fa-shuffle"></i> Acak Nama';
                
                // Efek sukses saat berhasil disalin
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin!';
                btn.style.background = '#2ecc71';
                
                setTimeout(() => { 
                    btn.innerHTML = originalText; 
                    btn.style.background = '#54a0ff';
                }, 1500);
            }).catch(err => {
                alert("Gagal menyalin teks: " + err);
            });
        }
        // -----------------------------

        // Konfigurasi Firebase Shopee
        const firebaseConfig = {
            apiKey: "AIzaSyDX5o3n7iQjqcS0ZJsbir_35JOpG7jqkPA",
            authDomain: "link-shopee-bc394.firebaseapp.com",
            projectId: "link-shopee-bc394",
            storageBucket: "link-shopee-bc394.firebasestorage.app",
            messagingSenderId: "111837568012",
            appId: "1:111837568012:web:b34dc5675becd8ef896229",
            measurementId: "G-2BLSC5YMS6",
            databaseURL: "https://link-shopee-bc394-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let isAdmin = false;
        let editingKey = null;
        let menuDataCache = {};

        function formatRupiah(element) {
            let angka = element.value.replace(/[^,\d]/g, '').toString();
            let split = angka.split(',');
            let sisa = split[0].length % 3;
            let rupiah = split[0].substr(0, sisa);
            let ribuan = split[0].substr(sisa).match(/\d{3}/gi);

            if (ribuan) {
                let separator = sisa ? '.' : '';
                rupiah += separator + ribuan.join('.');
            }

            rupiah = split[1] != undefined ? rupiah + ',' + split[1] : rupiah;
            element.value = rupiah ? 'Rp ' + rupiah : '';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('muzans_shopee_email');
            const savedPass = localStorage.getItem('muzans_shopee_pass');
            if (savedEmail && savedPass) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('password').value = savedPass;
                document.getElementById('rememberMe').checked = true;
            }
        });

        function toggleLoginForm(event) {
            event.stopPropagation();
            const popup = document.getElementById('login-popup');
            popup.style.display = (popup.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onclick = function(e) {
            if (!document.getElementById('auth-wrapper').contains(e.target)) {
                document.getElementById('login-popup').style.display = 'none';
            }
        };

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;

            auth.signInWithEmailAndPassword(email, pass)
            .then(() => {
                if(remember) {
                    localStorage.setItem('muzans_shopee_email', email);
                    localStorage.setItem('muzans_shopee_pass', pass);
                } else {
                    localStorage.removeItem('muzans_shopee_email');
                    localStorage.removeItem('muzans_shopee_pass');
                }
                document.getElementById('login-popup').style.display = 'none';
            })
            .catch(() => alert("Gagal Login"));
        }

        function logout() { editingKey = null; auth.signOut(); }

        auth.onAuthStateChanged(user => {
            isAdmin = !!user;
            document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('btn-logout').style.display = isAdmin ? 'block' : 'none';
            document.querySelector('[onclick="toggleLoginForm(event)"]').style.display = isAdmin ? 'none' : 'block';
            renderMenus(); 
        });

        function addMenu() {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            const price = document.getElementById('price').value; 
            const status = document.getElementById('status').value; 

            if(title && url) {
                db.ref('linkshopee').push({
                    title: title, 
                    url: url,
                    price: price, 
                    status: status, 
                    createdAt: firebase.database.ServerValue.TIMESTAMP 
                }).then(() => {
                    document.getElementById('title').value = "";
                    document.getElementById('url').value = "";
                    document.getElementById('price').value = "";
                    document.getElementById('status').value = ""; 
                });
            } else {
                alert("Minimal Nama dan URL harus diisi!");
            }
        }

        db.ref('linkshopee').on('value', (snap) => {
            menuDataCache = snap.val() || {};
            renderMenus();
        });

        function renderMenus() {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            const colors = ['#ff6b6b', '#54a0ff', '#5f27cd', '#ff9f43', '#1dd1a1', '#00d2d3', '#f368e0', '#48dbfb', '#ee5253', '#10ac84'];
            
            const keys = Object.keys(menuDataCache);
            const reversedKeys = keys.reverse();

            reversedKeys.forEach((key, index) => {
                const data = menuDataCache[key];
                
                const itemDate = data.createdAt ? new Date(data.createdAt) : new Date();
                const isNew = Math.ceil(Math.abs(new Date() - itemDate) / (1000 * 60 * 60 * 24)) <= 7;
                
                let statusLabel = "";
                if (data.status) {
                    statusLabel = String(data.status).toUpperCase();
                } else if (data.isStar === true || String(data.isStar).toLowerCase() === "true") {
                    statusLabel = "STAR";
                } else if (data.isMall === true || String(data.isMall).toLowerCase() === "true") {
                    statusLabel = "MALL";
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'menu-wrapper';

                if (isAdmin && editingKey === key) {
                    wrapper.innerHTML = `
                        <div class="edit-mode-container">
                            <input type="text" id="ed-t-${key}" value="${data.title}" placeholder="Nama Produk">
                            <input type="text" id="ed-u-${key}" value="${data.url}" placeholder="URL">
                            <input type="text" id="ed-p-${key}" value="${data.price || ''}" placeholder="Harga" oninput="formatRupiah(this)">
                            
                            <select id="ed-s-${key}" class="admin-select">
                                <option value="" ${!statusLabel ? 'selected' : ''}>- Tanpa Label -</option>
                                <option value="STAR" ${statusLabel === 'STAR' ? 'selected' : ''}>Star</option>
                                <option value="MALL" ${statusLabel === 'MALL' ? 'selected' : ''}>Mall</option>
                            </select>

                            <div style="display:flex; gap:5px;">
                                <button class="btn-add" style="margin:0; background:#2ecc71; padding:5px" onclick="saveEdit('${key}')">Simpan</button>
                                <button class="btn-add" style="margin:0; background:#95a5a6; padding:5px" onclick="cancelEdit()">Batal</button>
                            </div>
                        </div>`;
                } else {
                    wrapper.innerHTML = `
                        ${isNew ? '<div class="badge-new">NEW</div>' : ''}
                        <a href="${data.url}" target="_blank" class="menu-item" style="background:${colors[index % colors.length]}">
                            <span>${data.title}</span>
                            <div class="details-container">
                                ${statusLabel ? `<span class="status-badge">${statusLabel}</span>` : ''}
                                ${data.price ? `<span class="price-text">${data.price}</span>` : ''}
                            </div>
                        </a>
                        ${isAdmin ? `
                        <div class="admin-controls">
                            <button class="btn-ctrl" onclick="startEdit('${key}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-ctrl" style="background:#e74c3c" onclick="deleteMenu('${key}')"><i class="fa-solid fa-trash"></i></button>
                        </div>` : ''}`;
                }
                container.appendChild(wrapper);
            });
        }

        function startEdit(key) { editingKey = key; renderMenus(); }
        function cancelEdit() { editingKey = null; renderMenus(); }

        function saveEdit(key) {
            db.ref('linkshopee/' + key).update({
                title: document.getElementById(`ed-t-${key}`).value,
                url: document.getElementById(`ed-u-${key}`).value,
                price: document.getElementById(`ed-p-${key}`).value,
                status: document.getElementById(`ed-s-${key}`).value 
            }).then(() => { editingKey = null; renderMenus(); });
        }

        function deleteMenu(key) { if(confirm("Hapus?")) db.ref('linkshopee/' + key).remove(); }
    </script>
</body>
</html>
